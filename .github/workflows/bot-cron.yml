name: hi-team bot cron

# Бесплатная замена почасовому крону Vercel (на плане Hobby крон можно
# запускать только раз в сутки). Раз в час дёргаем /api/cron/bot, а роут сам
# решает — слать ли напоминания/сводку по настройкам из «Команды».
#
# Нужны два секрета репозитория (Settings → Secrets and variables → Actions):
#   APP_URL      — адрес деплоя без слэша в конце, напр. https://hi-team.vercel.app
#   CRON_SECRET  — то же значение, что и в переменных окружения Vercel

on:
  schedule:
    - cron: "0 * * * *" # каждый час (время UTC)
  workflow_dispatch: {} # плюс кнопка «Run workflow» для ручного запуска

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/cron/bot
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::Секрет репозитория APP_URL не задан (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Секрет репозитория CRON_SECRET не задан."
            exit 1
          fi
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/bot")
          echo "HTTP $code"
          cat /tmp/resp.txt || true
          echo
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            if [ "$code" = "401" ]; then
              echo "::error::401 — CRON_SECRET в GitHub не совпадает с переменной CRON_SECRET в Vercel (или не задан в Vercel)."
            else
              echo "::error::/api/cron/bot вернул HTTP $code"
            fi
            exit 1
          fi
